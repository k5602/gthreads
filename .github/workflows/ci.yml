name: CI

on:
  push:
    branches: [main, "feat/*"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          find src/ include/ tests/ \
            -name '*.c' -o -name '*.h' \
            | xargs clang-format --dry-run --Werror

  build-and-test:
    name: Build & Test (${{ matrix.compiler }}, ${{ matrix.build_type }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        build_type: [Debug, Release]
        include:
          - compiler: gcc
            cc: gcc
          - compiler: clang
            cc: clang

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libcmocka-dev ccache

      - name: Set up ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-${{ matrix.compiler }}-${{ matrix.build_type }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ matrix.compiler }}-${{ matrix.build_type }}-
            ccache-${{ matrix.compiler }}-

      - name: Configure CMake
        run: |
          cmake_args="-DCMAKE_C_COMPILER=${{ matrix.cc }}"
          cmake_args="$cmake_args -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}"
          if [ "${{ matrix.build_type }}" = "Debug" ]; then
            cmake_args="$cmake_args -DGTHREADS_ENABLE_SANITIZERS=ON"
          fi
          cmake -B build $cmake_args

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure

  sanitizer-check:
    name: Sanitizers (${{ matrix.compiler }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        include:
          - compiler: gcc
            cc: gcc
          - compiler: clang
            cc: clang

    env:
      ASAN_OPTIONS: detect_leaks=1:halt_on_error=1:abort_on_error=1
      UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libcmocka-dev ccache

      - name: Set up ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-sanitizer-${{ matrix.compiler }}-${{ github.sha }}
          restore-keys: |
            ccache-sanitizer-${{ matrix.compiler }}-

      - name: Configure CMake (Debug + Sanitizers)
        run: |
          cmake -B build \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_BUILD_TYPE=Debug \
            -DGTHREADS_ENABLE_SANITIZERS=ON

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Test with sanitizers
        run: ctest --test-dir build --output-on-failure
